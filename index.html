<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background: radial-gradient(circle at top, #1a102a, #05070f 60%);
  color:#e5e7eb;
}

.container{
  max-width:900px;
  margin:auto;
  padding:120px 20px;
}

/* HERO */
h1{
  font-size:54px;
  line-height:1.05;
  margin:0;
}

.highlight{
  background:linear-gradient(90deg,#c084fc,#60a5fa,#f472b6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.sub{
  margin-top:20px;
  color:#b6b6c7;
  max-width:700px;
  line-height:1.7;
}

.profile{
  width:110px;
  height:110px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:25px;
  border:2px solid rgba(192,132,252,0.6);
}

/* CARDS */
.card{
  padding:20px;
  border-left:2px solid rgba(192,132,252,0.4);
  margin-bottom:20px;
  background:rgba(17,24,39,0.5);
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
  border-left:2px solid #c084fc;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#0b1020;
  padding:40px;
  max-width:700px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
}

.close{
  float:right;
  cursor:pointer;
  color:#c084fc;
  font-size:18px;
}

ul{
  color:#b6b6c7;
  line-height:1.8;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<img src="profile.jpg" class="profile">

<h1>
I design <span class="highlight">premium customer experiences</span><br>
across luxury retail & digital commerce.
</h1>

<p class="sub">
CX & e-commerce specialist focused on luxury retail, customer experience and digital commerce operations.
</p>
</div>

<h3 style="margin-top:80px;color:#9ca3af;letter-spacing:2px;font-size:12px;">EXPERIENCE</h3>

<div class="card" onclick="openModal('hermes')">Hermès</div>
<div class="card" onclick="openModal('louboutin')">Christian Louboutin</div>
<div class="card" onclick="openModal('fiskars')">Fiskars Group</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal(event)">
<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<div id="content"></div>

</div>
</div>

<script>
function openModal(type){
  let content = "";

  if(type === "hermes"){
    content = `
    <h2>Hermès</h2>
    <h4>Role Highlights</h4>
    <ul>
      <li>Luxury client experience in high-end retail environment</li>
      <li>VIP customer journeys & personalized service</li>
      <li>Premium brand standards execution</li>
    </ul>
    <h4>Skills</h4>
    <ul>
      <li>Clienteling</li>
      <li>CRM systems</li>
      <li>Luxury retail communication</li>
    </ul>`;
  }

  if(type === "louboutin"){
    content = `
    <h2>Christian Louboutin</h2>
    <ul>
      <li>Luxury retail sales & client experience</li>
      <li>Store operations support</li>
      <li>High-end customer engagement</li>
    </ul>`;
  }

  if(type === "fiskars"){
    content = `
    <h2>Fiskars Group</h2>
    <ul>
      <li>E-commerce & CX operations</li>
      <li>Shopify migration support</li>
      <li>Global customer workflows</li>
    </ul>`;
  }

  document.getElementById("content").innerHTML = content;
  document.getElementById("modal").style.display = "flex";
}

function closeModal(e){
  if(!e || e.target.id === "modal"){
    document.getElementById("modal").style.display = "none";
  }
}
</script>

</body>
</html>
